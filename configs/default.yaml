# Defaults used when no --config is passed.
# Backend-specific files in this folder override these values.

# Which extraction backend to use.
#   vlm    : local Qwen3-VL via OpenAI-compatible server (per-page grounding).
#   mineru : OpenDataLab MinerU (layout model + OCR — best CJK figure accuracy).
backend: vlm

llm:
  base_url: ${LLM_BASE_URL:-http://localhost:8000/v1}
  api_key:  ${LLM_API_KEY:-sk-local}
  model:    ${LLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
  use_response_format: true
  timeout: 180
  max_retries: 2
  # Output token budget per page. Must be <= (server max_model_len - input tokens).
  max_tokens: 4096

mineru:
  # Path to the `mineru` binary. ``null`` = auto-discover via PATH.
  binary: null
  # MinerU backend:
  #   pipeline             : layout (DocLayout-YOLO) + PP-OCRv5 + RapidTable. Best CJK accuracy.
  #   vlm-transformers     : MinerU2.5 VLM via transformers.
  #   vlm-vllm-async-engine: MinerU2.5 VLM via vLLM (fastest, needs CUDA).
  backend: pipeline
  lang: korean
  # `method` only applies to backend=pipeline. auto detects scanned vs born-digital.
  method: auto
  # Extra args appended to the CLI (e.g., ["-d", "cuda", "--vram", "16"]).
  extra_args: []

render:
  dpi: 200
  max_side: 2048
  image_format: "png"

pipeline:
  concurrency: 4

output:
  markdown_path: "${stem}.md"
  images_dir: "${stem}_images"
  asset_name: "p{page:03d}_{kind}{idx:02d}.png"
