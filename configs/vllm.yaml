extends: default.yaml

llm:
  base_url: http://localhost:8000/v1
  model: Qwen/Qwen3-VL-8B-Instruct
  use_response_format: true
  # Server is launched with --max-model-len 16384.
  # Page image (~1-2k tokens) + system prompt (~500) leaves ~12k for output JSON.
  max_tokens: 4096

pipeline:
  concurrency: 4
